<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local area calibration</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #f8f9fa;
    --card: #fff;
    --border: #dee2e6;
    --text: #212529;
    --muted: #6c757d;
    --accent: #2b6cb0;
    --accent-light: #ebf4ff;
    --green: #38a169;
    --green-bg: #c6f6d5;
    --red: #e53e3e;
    --red-bg: #fed7d7;
    --yellow: #d69e2e;
    --yellow-bg: #fefcbf;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }
  .banner { background: #2c6e6a; color: #fff; padding: 18px 0; margin-bottom: 24px; text-align: center; }
  .banner h1 { font-size: 1.4rem; font-weight: 700; margin: 0; color: #fff; }
  h1 { font-size: 2rem; font-weight: 700; margin-bottom: 16px; }
  .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 24px; }
  .tabs { display: flex; gap: 2px; background: var(--border); border-radius: 5px; padding: 2px; align-self: flex-end; }
  .tab { padding: 8px 14px; text-align: center; font-size: 0.95rem; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--muted); border-radius: 3px; transition: all 0.15s; white-space: nowrap; }
  .tab.active { background: var(--card); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  .tab:hover:not(.active) { color: var(--text); }
  .filters { display: flex; gap: 10px; margin-bottom: 16px; align-items: flex-end; width: 100%; }
  .filter-group { display: flex; flex-direction: column; gap: 3px; }
  .filter-group.grow { flex: 1; }
  .filter-group label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  select, .search { padding: 8px 12px; border: 1px solid var(--border); border-radius: 5px; font-size: 0.95rem; background: var(--card); width: 100%; }
  select { min-width: 140px; }
  .search { min-width: 120px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; }
  .stat-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat { background: var(--bg); border-radius: 6px; padding: 12px 16px; flex: 1; min-width: 130px; }
  .stat .value { font-size: 1.5rem; font-weight: 700; }
  .stat .label { font-size: 0.75rem; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
  th { text-align: left; padding: 8px 10px; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); border-bottom: 2px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--text); }
  .info-icon { display: inline-flex; align-items: center; justify-content: center; width: 9px; height: 9px; border-radius: 50%; background: var(--border); color: var(--muted); font-size: 6px; font-weight: 700; font-style: normal; margin-left: 3px; cursor: help; vertical-align: middle; text-transform: lowercase; }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
  .badge.green { background: var(--green-bg); color: var(--green); }
  .badge.yellow { background: var(--yellow-bg); color: var(--yellow); }
  .badge.red { background: var(--red-bg); color: var(--red); }
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
  .error { text-align: center; padding: 60px 20px; color: var(--red); }
  .mono { font-family: "SF Mono", SFMono-Regular, Consolas, monospace; font-size: 0.8rem; }
  .scroll-table { overflow-x: auto; }
  .hint { color: var(--muted); font-size: 1.1rem; padding: 60px 0; text-align: center; }
  .group-header td { background: var(--bg); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--accent); padding: 10px; border-bottom: 2px solid var(--accent); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

function Info({ tip }) {
  const [show, setShow] = useState(false);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  const ref = React.useRef(null);

  const onEnter = () => {
    if (ref.current) {
      const r = ref.current.getBoundingClientRect();
      setPos({ x: r.left + r.width / 2, y: r.top });
    }
    setShow(true);
  };

  return (
    <>
      <span ref={ref} className="info-icon" onMouseEnter={onEnter} onMouseLeave={() => setShow(false)}>i</span>
      {show && ReactDOM.createPortal(
        <div style={{
          position:"fixed", left: pos.x, top: pos.y - 8,
          transform: "translate(-50%, -100%)",
          background: "#212529", color: "#fff",
          fontSize: "0.75rem", fontWeight: 400, textTransform: "none",
          letterSpacing: "normal", lineHeight: 1.4,
          padding: "8px 12px", borderRadius: 6, width: 240,
          zIndex: 9999, boxShadow: "0 4px 12px rgba(0,0,0,0.15)",
          pointerEvents: "none", whiteSpace: "normal",
        }}>{tip}</div>,
        document.body
      )}
    </>
  );
}

function fmt(v) {
  if (v == null) return "–";
  if (typeof v === "number") return Number(v).toLocaleString(undefined, { maximumFractionDigits: 0 });
  return String(v);
}

function pctBadge(pct) {
  if (pct == null) return "–";
  const abs = Math.abs(pct);
  const cls = abs <= 10 ? "green" : abs <= 30 ? "yellow" : "red";
  const sign = pct >= 0 ? "+" : "";
  return <span className={`badge ${cls}`}>{sign}{pct.toFixed(1)}%</span>;
}

function essBadge(ess) {
  if (ess == null) return "–";
  const cls = ess >= 100 ? "green" : ess >= 30 ? "yellow" : "red";
  return <span className={`badge ${cls}`}>{fmt(ess)}</span>;
}

function useSortable(data, defaultKey, defaultAsc = true) {
  const [sortKey, setSortKey] = useState(defaultKey);
  const [asc, setAsc] = useState(defaultAsc);
  const sorted = useMemo(() => {
    if (!data) return [];
    const copy = [...data];
    copy.sort((a, b) => {
      const va = a[sortKey], vb = b[sortKey];
      if (va == null && vb == null) return 0;
      if (va == null) return 1;
      if (vb == null) return -1;
      if (typeof va === "string") return asc ? va.localeCompare(vb) : vb.localeCompare(va);
      return asc ? va - vb : vb - va;
    });
    return copy;
  }, [data, sortKey, asc]);
  const toggle = (key) => {
    if (key === sortKey) setAsc(!asc);
    else { setSortKey(key); setAsc(key === "area_name" || key === "variable" || key === "name"); }
  };
  const indicator = (key) => key === sortKey ? (asc ? " ▲" : " ▼") : "";
  return { sorted, toggle, indicator };
}

const CATEGORY_ORDER = ["Demographics", "Income", "Housing & tenure", "Benefits"];

function varCategory(v) {
  if (v.startsWith("age/")) return "Demographics";
  if (v.startsWith("hmrc/") || v.startsWith("ons/net_income") || v === "ons/housing_costs") return "Income";
  if (v.startsWith("tenure/") || v.startsWith("rent/")) return "Housing & tenure";
  return "Benefits";
}

function groupByCategory(rows) {
  const groups = {};
  for (const r of rows) {
    const cat = varCategory(r.variable);
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(r);
  }
  return CATEGORY_ORDER.filter(c => groups[c]).map(c => ({ category: c, rows: groups[c] }));
}

function TableMessage({ rows, limit, children }) {
  if (rows.length === 0) return <div className="hint">No results. Try broadening your search.</div>;
  if (rows.length > limit) return (
    <div className="hint">
      {rows.length.toLocaleString()} results — narrow your search to see the table.
    </div>
  );
  return children;
}

/* ── Variables tab: sample sizes ── */
function VariablesTab({ data, level, areaSearch, varSearch, category }) {
  const ss = useMemo(() => data.sample_sizes?.filter(r => r.level === level) || [], [data, level]);

  const filtered = useMemo(() => {
    let rows = ss;
    if (category !== "all") rows = rows.filter(r => varCategory(r.variable) === category);
    if (areaSearch) rows = rows.filter(r => r.area_name === areaSearch);
    if (varSearch) rows = rows.filter(r => r.variable.toLowerCase().includes(varSearch.toLowerCase()));
    return rows;
  }, [ss, category, areaSearch, varSearch]);

  const { sorted, toggle, indicator } = useSortable(filtered, "area_name");
  const groups = useMemo(() => groupByCategory(sorted), [sorted]);

  const essVals = filtered.filter(r => r.ess != null).map(r => r.ess);
  const medianEss = essVals.length ? essVals.sort((a,b) => a-b)[Math.floor(essVals.length/2)] : null;

  return (
    <>
      <TableMessage rows={filtered} limit={5000}>
        <div className="card">
          <div className="scroll-table">
            <table>
              <thead>
                <tr>
                  <th onClick={() => toggle("area_name")}>Area{indicator("area_name")} <Info tip="Local area name (constituency or local authority)." /></th>
                  <th onClick={() => toggle("variable")}>Variable{indicator("variable")} <Info tip="FRS variable used in calibration." /></th>
                  <th onClick={() => toggle("n_in_area")} style={{textAlign:"right"}}>Unweighted HHs{indicator("n_in_area")} <Info tip="Households assigned non-zero weight for this area by the optimiser (unweighted count)." /></th>
                  <th onClick={() => toggle("n_nonzero_weight")} style={{textAlign:"right"}}>Donor pool{indicator("n_nonzero_weight")} <Info tip="Households with non-zero weight for this area AND non-zero value for this variable." /></th>
                  <th onClick={() => toggle("weighted_total")} style={{textAlign:"right"}}>Wtd total{indicator("weighted_total")} <Info tip="Sum of calibration weights — estimated real households in this area." /></th>
                  <th onClick={() => toggle("weighted_with_value")} style={{textAlign:"right"}}>Wtd with value{indicator("weighted_with_value")} <Info tip="Weighted count of households with a non-zero value for this variable." /></th>
                  <th onClick={() => toggle("ess")} style={{textAlign:"right"}}>ESS{indicator("ess")} <Info tip="Effective sample size: ESS = (Σwᵢ)² / Σwᵢ². Measures how many FRS households meaningfully contribute after calibration. If weights are equal, ESS = n. If weight concentrates on a few households, ESS drops well below the donor pool. Green ≥ 100, yellow ≥ 30, red < 30." /></th>
                </tr>
              </thead>
              <tbody>
                {groups.map(g => (
                  <React.Fragment key={g.category}>
                    <tr className="group-header"><td colSpan={7}>{g.category}</td></tr>
                    {g.rows.map(r => (
                      <tr key={`${r.area_code}-${r.variable}`}>
                        <td>{r.area_name}</td>
                        <td className="mono">{r.variable}</td>
                        <td style={{textAlign:"right"}}>{fmt(r.n_in_area)}</td>
                        <td style={{textAlign:"right"}}>{fmt(r.n_nonzero_weight)}</td>
                        <td style={{textAlign:"right"}}>{fmt(r.weighted_total)}</td>
                        <td style={{textAlign:"right"}}>{fmt(r.weighted_with_value)}</td>
                        <td style={{textAlign:"right"}}>{essBadge(r.ess)}</td>
                      </tr>
                    ))}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </TableMessage>
    </>
  );
}

/* ── Targets tab: target value + calibration error ── */
function TargetsTab({ data, level, areaSearch, varSearch, category }) {
  const errs = useMemo(() => data.errors?.filter(r => r.level === level) || [], [data, level]);

  const filtered = useMemo(() => {
    let rows = errs;
    if (category !== "all") rows = rows.filter(r => varCategory(r.variable) === category);
    if (areaSearch) rows = rows.filter(r => r.area_name === areaSearch);
    if (varSearch) rows = rows.filter(r => r.variable.toLowerCase().includes(varSearch.toLowerCase()));
    return rows;
  }, [errs, category, areaSearch, varSearch]);

  const { sorted, toggle, indicator } = useSortable(filtered, "area_name");
  const groups = useMemo(() => groupByCategory(sorted), [sorted]);

  const absPcts = filtered.filter(r => r.pct_error != null).map(r => Math.abs(r.pct_error));
  const medianAbsPct = absPcts.length ? absPcts.sort((a,b) => a-b)[Math.floor(absPcts.length/2)] : null;

  return (
    <>
      <TableMessage rows={filtered} limit={5000}>
        <div className="card">
          <div className="scroll-table">
            <table>
              <thead>
                <tr>
                  <th onClick={() => toggle("area_name")}>Area{indicator("area_name")} <Info tip="Local area name (constituency or local authority)." /></th>
                  <th onClick={() => toggle("variable")}>Variable{indicator("variable")} <Info tip="Calibration target variable." /></th>
                  <th onClick={() => toggle("target")} style={{textAlign:"right"}}>Target{indicator("target")} <Info tip="External benchmark the calibration tries to match (e.g. ONS population, HMRC income total)." /></th>
                  <th onClick={() => toggle("estimate")} style={{textAlign:"right"}}>Estimate{indicator("estimate")} <Info tip="Weighted sum from the calibrated FRS: weights x household values. Approximate — uses raw FRS data, not the full microsimulation." /></th>
                  <th onClick={() => toggle("pct_error")} style={{textAlign:"right"}}>Error %{indicator("pct_error")} <Info tip="(Estimate - target) / target. Green: within 10%. Yellow: within 30%. Red: over 30%." /></th>
                </tr>
              </thead>
              <tbody>
                {groups.map(g => (
                  <React.Fragment key={g.category}>
                    <tr className="group-header"><td colSpan={5}>{g.category}</td></tr>
                    {g.rows.map(r => (
                      <tr key={`${r.area_code}-${r.variable}`}>
                        <td>{r.area_name}</td>
                        <td className="mono">{r.variable}</td>
                        <td style={{textAlign:"right"}}>{fmt(r.target)}</td>
                        <td style={{textAlign:"right"}}>{fmt(r.estimate)}</td>
                        <td style={{textAlign:"right"}}>{pctBadge(r.pct_error)}</td>
                      </tr>
                    ))}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </TableMessage>
    </>
  );
}

/* ── Main App ── */
function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [tab, setTab] = useState("variables");
  const [level, setLevel] = useState("constituency");
  const [category, setCategory] = useState("all");
  const [areaSearch, setAreaSearch] = useState("");
  const [varSearch, setVarSearch] = useState("");

  useEffect(() => {
    fetch("calibration_diagnostics.json?v=2")
      .then(r => { if (!r.ok) throw new Error(`${r.status} ${r.statusText}`); return r.json(); })
      .then(setData)
      .catch(e => setError(e.message));
  }, []);

  if (error) return (
    <div className="container">
      <div className="error">
        <p>Failed to load data: {error}</p>
        <p style={{fontSize:"0.85rem",marginTop:8}}>Run <code>python calibration_diagnostics.py</code> to generate calibration_diagnostics.json</p>
      </div>
    </div>
  );
  const areaNames = useMemo(() => {
    if (!data) return [];
    const src = data.sample_sizes || data.errors || [];
    const names = [...new Set(src.filter(r => r.level === level).map(r => r.area_name))];
    return names.sort();
  }, [data, level]);

  if (!data) return <div className="container"><div className="loading">Loading diagnostics…</div></div>;

  return (
    <>
      <div className="banner"><h1>Local area calibration</h1></div>
    <div className="container">

      <div className="filters">
        <div className="filter-group">
          <label>View</label>
          <div className="tabs">
            <button className={`tab ${tab === "variables" ? "active" : ""}`} onClick={() => setTab("variables")}>Sample size</button>
            <button className={`tab ${tab === "targets" ? "active" : ""}`} onClick={() => setTab("targets")}>Target error</button>
          </div>
        </div>
        <div className="filter-group">
          <label>Geographic level</label>
          <select value={level} onChange={e => { setLevel(e.target.value); setAreaSearch(""); }}>
            <option value="constituency">Constituency</option>
            <option value="local_authority">Local authority</option>
            <option value="country">Country</option>
          </select>
        </div>
        <div className="filter-group">
          <label>Category</label>
          <select value={category} onChange={e => setCategory(e.target.value)}>
            <option value="all">All categories</option>
            {CATEGORY_ORDER.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div className="filter-group grow">
          <label>Area</label>
          <select value={areaSearch} onChange={e => setAreaSearch(e.target.value)}>
            <option value="">{level === "country" ? "All countries" : "Select an area"}</option>
            {areaNames.map(n => <option key={n} value={n}>{n}</option>)}
          </select>
        </div>
        <div className="filter-group grow">
          <label>Variable</label>
          <input className="search" placeholder="e.g. age, employment, tenure…" value={varSearch} onChange={e => setVarSearch(e.target.value)} />
        </div>
      </div>

      {(() => {
        const needsArea = !areaSearch && level !== "country";
        if (needsArea) return <div className="hint">Select an area above to view results.</div>;
        if (tab === "variables") return <VariablesTab data={data} level={level} category={category} areaSearch={areaSearch} varSearch={varSearch} />;
        if (tab === "targets") return <TargetsTab data={data} level={level} category={category} areaSearch={areaSearch} varSearch={varSearch} />;
        return null;
      })()}
    </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
